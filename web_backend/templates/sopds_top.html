{% load i18n static %}

<div class="top-bar">

    <div class="top-bar-title">
        <span data-responsive-toggle="main_menu" data-hide-for="medium">
          <button class="menu-icon" type="button" data-toggle></button>
       </span>
       <div class="title-bar-title">
         <a href="/">
           <div class="show-for-small-only">SOPDS</div>
           <div class="show-for-medium">SIMPLE OPDS CATALOG</div>
         </a>
      </div>
    </div>

    <div class="top-bar-right">
        {% if sopds_auth %}
        <ul class="menu" style="font-size:90%;">
            {% if user.is_authenticated %}
                <li><a href="{% url "web:logout" %}"><img class="nav-icon" src="{% static "images/fi-torsos.svg" %}" alt="">{% trans "Logout" %} ({{ user.username }})</a></li>
            {% if user.is_superuser %}
                <li><a href="{% url "admin:index" %}"><img class="nav-icon" src="{% static "images/fi-widget.svg" %}" alt="">{% trans "Settings" %}</a></li>
            {% endif %}
            {% else %}
                <li><a href="{% url "web:login" %}"><img class="nav-icon" src="{% static "images/fi-torsos.svg" %}" alt="">{% trans "Login" %}</a></li>
            {% endif %}
        </ul>
        {% endif %}
    </div>

</div>
