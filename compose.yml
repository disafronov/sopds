# ! LOCAL DEVELOPMENT ONLY. DO NOT USE THIS COMPOSE FILE IN PRODUCTION.

services:
  postgres:
    image: 'postgres:17'
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: sopds
      POSTGRES_PASSWORD: sopds
      POSTGRES_DB: sopds
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}" ]
      interval: 30s
      timeout: 60s
      retries: 5
      start_period: 60s

  mailpit:
    image: axllent/mailpit
    ports:
      - "1026:1025"
      - "8025:8025"

  mariadb:
    image: 'mariadb:lts'
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_nopad_bin
    ports:
      - "3306:3306"
    environment:
      MARIADB_USER: sopds
      MARIADB_PASSWORD: sopds
      MARIADB_DATABASE: sopds
      MARIADB_ROOT_PASSWORD: sopds
    volumes:
      - mariadb_data:/var/lib/mysql/
    healthcheck:
      test: [ "CMD", "healthcheck.sh", "--connect", "--innodb_initialized" ]
      interval: 30s
      timeout: 60s
      retries: 5
      start_period: 60s

volumes:
  postgres_data:
  mariadb_data:
