---
name: Lint and test

"on":
  pull_request:
    branches:
      - main
      - release

jobs:
  lint_and_test:
    name: "Lint and test"
    runs-on: ubuntu-latest
    permissions:
      contents: read

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: database
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U user -d database"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 30

      mariadb:
        image: mariadb:lts
        command: >-
          --character-set-server=utf8mb4
          --collation-server=utf8mb4_nopad_bin
        env:
          MARIADB_DATABASE: database
          MARIADB_ROOT_PASSWORD: password
        ports:
          - 3306:3306
        options: >-
          --health-cmd "healthcheck.sh --connect --innodb_initialized"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 30

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Read Python version
        id: python_version
        run: echo "version=$(cat .python-version | tr -d '[:space:]')" >> $GITHUB_OUTPUT

      - name: Install gettext
        run: sudo apt-get update -y && sudo apt-get install -y gettext

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: assets/sopds-sass/package-lock.json

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-suffix: ${{ steps.python_version.outputs.version }}

      - name: Install dependencies
        run: |
          uv sync --frozen --python ${{ steps.python_version.outputs.version }}
          npm ci --prefix assets/sopds-sass
        env:
          UV_PYTHON: ${{ steps.python_version.outputs.version }}

      - name: Run all checks
        run: make all
        env:
          UV_PYTHON: ${{ steps.python_version.outputs.version }}
          DJANGO_DEBUG: "1"
          DATABASE_URL_POSTGRESQL: postgres://user:password@127.0.0.1:5432/database
          DATABASE_URL_MYSQL: "mysql://root:password@127.0.0.1:3306/database?charset=utf8mb4&collation=utf8mb4_nopad_bin"

      - name: Audit dependencies
        run: make audit
        env:
          UV_PYTHON: ${{ steps.python_version.outputs.version }}
